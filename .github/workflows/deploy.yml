name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the workflow when you push to the main branch
  workflow_dispatch: # Allows you to manually trigger this workflow from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Compiles the source files
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Speeds up builds by caching node_modules

      - name: Install dependencies
        run: cd app && npm ci # Performs a clean, reproducible installation

      - name: Compile site
        run: cd app && npm run build # Compiles your code into a production folder (e.g., dist, build, or out)

      - name: Upload compiled files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # CHANGE THIS: Point it to your compilation output folder (usually 'dist', 'build', or 'public')
          path: './app/dist' 

  # Deploy job: Takes the uploaded artifact and publishes it
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
